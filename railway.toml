[build]
builder = "nixpacks"
buildCommand = "cd services/mixreview-api && npm install"

[deploy]
startCommand = "cd services/mixreview-api && npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[environments.production.variables]
NODE_ENV = "production"
